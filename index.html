<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E2A38">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
:root{
  --paper:#F7F5EF; --card:#FFFFFF; --ink:#1E2A38; --ink-soft:#4A5766; --ink-faint:#8B94A0;
  --green:#2E6E4E; --green-soft:#E4EEE8; --claret:#8C3A3A; --claret-soft:#F3E6E6;
  --brass:#A8842C; --brass-soft:#F4EDDC; --rule:#DDD8CC; --rule-soft:#EAE6DC;
  --mono:ui-monospace,"SF Mono","Cascadia Mono",Consolas,Menlo,monospace;
  --serif:Charter,Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;min-height:100vh}
body::before{content:"";position:fixed;top:0;left:0;right:0;height:6px;background:repeating-linear-gradient(90deg,var(--ink) 0 14px,var(--brass) 14px 16px);z-index:50}
.wrap{max-width:880px;margin:0 auto;padding:26px 16px 90px}
header.mast{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.mast h1{font-family:var(--serif);font-weight:700;font-size:1.9rem;letter-spacing:.01em}
.mast h1 span{color:var(--brass)}
.mast .period-label{font-family:var(--mono);font-size:.8rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em}
.tagline{font-size:.82rem;color:var(--ink-faint);margin-bottom:18px}
nav.tabs{display:flex;gap:2px;border-bottom:2px solid var(--ink);margin-bottom:22px;flex-wrap:wrap}
nav.tabs button{appearance:none;border:1px solid var(--rule);border-bottom:none;background:var(--rule-soft);
  padding:8px 14px;font-family:var(--sans);font-size:.85rem;color:var(--ink-soft);cursor:pointer;
  border-radius:6px 6px 0 0;position:relative;top:0}
nav.tabs button.active{background:var(--card);color:var(--ink);font-weight:600;border-color:var(--ink);border-bottom:2px solid var(--card);top:2px}
nav.tabs button:focus-visible{outline:2px solid var(--brass);outline-offset:-2px}
.card{background:var(--card);border:1px solid var(--rule);border-radius:8px;padding:18px;margin-bottom:16px}
.card h2{font-family:var(--serif);font-size:1.12rem;margin-bottom:10px;display:flex;align-items:baseline;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card h2 .sub{font-family:var(--sans);font-size:.75rem;font-weight:400;color:var(--ink-faint)}
.hint{font-size:.78rem;color:var(--ink-faint);margin-top:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}
.bignum{font-family:var(--mono);font-size:2.3rem;font-weight:600;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.bignum.green{color:var(--green)}
.biglabel{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:2px}
.money{font-family:var(--mono);font-variant-numeric:tabular-nums}
table.ledger{width:100%;border-collapse:collapse;font-size:.88rem}
table.ledger th{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);
  text-align:left;padding:6px 8px;border-bottom:2px solid var(--ink)}
table.ledger td{padding:7px 8px;border-bottom:1px solid var(--rule-soft);vertical-align:middle}
table.ledger td.num,table.ledger th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
table.ledger tr:hover td{background:var(--paper)}
.bar{height:9px;background:var(--rule-soft);border-radius:5px;overflow:hidden;min-width:70px}
.bar i{display:block;height:100%;background:var(--green);border-radius:5px}
.bar i.warn{background:var(--claret)}
.chip{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:10px;border:1px solid;font-weight:600}
.chip.green{color:var(--green);border-color:var(--green);background:var(--green-soft)}
.chip.claret{color:var(--claret);border-color:var(--claret);background:var(--claret-soft)}
.chip.brass{color:var(--brass);border-color:var(--brass);background:var(--brass-soft)}
.chip.grey{color:var(--ink-soft);border-color:var(--rule);background:var(--rule-soft)}
button.btn{appearance:none;border:1px solid var(--ink);background:var(--ink);color:#fff;padding:8px 16px;
  border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:var(--sans)}
button.btn.quiet{background:var(--card);color:var(--ink)}
button.btn.small{padding:4px 10px;font-size:.76rem}
button.btn.danger{border-color:var(--claret);background:var(--card);color:var(--claret)}
button.btn:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
button.btn:disabled{opacity:.45;cursor:default}
input,select,textarea{font-family:var(--sans);font-size:.88rem;color:var(--ink);background:#FDFCF9;
  border:1px solid var(--rule);border-radius:5px;padding:6px 8px}
input.num{font-family:var(--mono);text-align:right;font-variant-numeric:tabular-nums}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brass);outline-offset:0;border-color:var(--brass)}
input.editable{background:#FBF6E4}
.formrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--rule-soft);flex-wrap:wrap}
.formrow label{font-size:.86rem;color:var(--ink-soft)}
/* counterfoil strip: the weekly envelope tickets */
.stubs{display:flex;gap:0;flex-wrap:wrap;margin-top:6px}
.stub{border:1px solid var(--ink);border-radius:4px;padding:10px 12px;min-width:118px;background:var(--card);
  position:relative;margin-right:14px;margin-bottom:10px;cursor:pointer;transition:background .15s}
.stub::after{content:"";position:absolute;right:-9px;top:6px;bottom:6px;border-right:2px dotted var(--ink-faint)}
.stub:last-child::after{display:none}
.stub .s-date{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft)}
.stub .s-amt{font-family:var(--mono);font-weight:600;font-size:1.02rem;margin-top:2px}
.stub.done{background:var(--green-soft)}
.stub.done .s-amt{color:var(--green)}
.stub .s-stamp{display:none;position:absolute;top:4px;right:6px;font-size:.6rem;font-weight:700;
  color:var(--green);border:1.5px solid var(--green);border-radius:3px;padding:0 4px;transform:rotate(-8deg);
  text-transform:uppercase;letter-spacing:.06em;background:var(--card)}
.stub.done .s-stamp{display:block}
.stub.due{border-color:var(--brass);box-shadow:0 0 0 2px var(--brass-soft)}
.stub:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
/* adviser chat */
.chat{display:flex;flex-direction:column;gap:10px;max-height:460px;overflow-y:auto;padding:4px 2px;margin-bottom:12px}
.msg{max-width:88%;padding:10px 13px;border-radius:8px;font-size:.89rem;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:var(--ink);color:#fff;border-bottom-right-radius:2px}
.msg.adviser{align-self:flex-start;background:var(--brass-soft);border:1px solid var(--rule);border-bottom-left-radius:2px}
.msg.adviser b{font-weight:700}
.chatbar{display:flex;gap:8px}
.chatbar textarea{flex:1;resize:vertical;min-height:44px}
.notebook li{font-size:.84rem;margin:4px 0 4px 16px;color:var(--ink-soft)}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:9px 18px;border-radius:6px;font-size:.85rem;opacity:0;transition:opacity .25s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.empty{font-size:.85rem;color:var(--ink-faint);padding:14px 0;text-align:center}
details.bucket-log summary{cursor:pointer;font-size:.78rem;color:var(--ink-soft)}
.flexrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.warn-text{color:var(--claret);font-weight:600}
.ok-text{color:var(--green);font-weight:600}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <h1>Ledger<span>.</span></h1>
    <div class="period-label" id="mastPeriod"></div>
  </header>
  <p class="tagline">Payday on the 28th. Bills from Barclays, buckets in savings, spending on Starling.</p>
  <nav class="tabs" id="tabs"></nav>
  <main id="view"></main>
</div>
<div class="toast" id="toast"></div>
<script>
"use strict";
/* ------------------------ state ------------------------ */
const LS_KEY="ledger.state.v1", LS_TOKEN="ledger.ghtoken", LS_APIKEY="ledger.apikey";
const uid=()=>Math.random().toString(36).slice(2,10);
const todayISO=()=>new Date().toISOString().slice(0,10);

function seedState(){
  return {
    version:1,updatedAt:new Date().toISOString(),
    settings:{pay:0,expectedReimb:0,buffer:150,gistId:"",owner:""},
    bills:[],buckets:[],periods:[],
    adviser:{notebook:[],messages:[],mode:"review"}
  };
}
let state=null;
try{state=JSON.parse(localStorage.getItem(LS_KEY))}catch(e){state=null}
if(!state||!state.version){state=seedState();persist(false)}

function persist(touch=true){
  if(touch)state.updatedAt=new Date().toISOString();
  localStorage.setItem(LS_KEY,JSON.stringify(state));
}

/* ------------------------ helpers ------------------------ */
const gbp=n=>{if(n==null||isNaN(n))return "";return "£"+Number(n).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2})};
const gbp0=n=>{if(n==null||isNaN(n))return "";return "£"+Math.round(Number(n)).toLocaleString("en-GB")};
const num=v=>{const n=parseFloat(String(v).replace(/[£,\s]/g,""));return isNaN(n)?0:n};
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtDate=iso=>{if(!iso)return"";const d=new Date(iso+"T12:00:00");return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"})};
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2200)}
const currentPeriod=()=>state.periods.length?state.periods[state.periods.length-1]:null;
const sumBills=()=>state.bills.reduce((a,b)=>a+num(b.amount),0);
const sumMove=held=>state.buckets.filter(b=>b.heldIn===held).reduce((a,b)=>a+num(b.monthly),0);
const discretionaryOf=p=>num(p.income)+num(p.reimbExpectedUsed??(p.reimbPaid?p.reimbReceived:p.reimbExpected))-num(p.billsTotal)-num(p.moveSavings)-num(p.moveISA);

function monthsUntil(iso){
  if(!iso)return null;
  const now=new Date(),d=new Date(iso+"T12:00:00");
  let m=(d.getFullYear()-now.getFullYear())*12+(d.getMonth()-now.getMonth());
  if(d.getDate()>=now.getDate())m+=0;else m-=0;
  return Math.max(m,0);
}
function targetMaths(b){
  if(!b.goal||!b.targetDate)return null;
  const m=Math.max(monthsUntil(b.targetDate),1);
  const remaining=Math.max(num(b.goal)-num(b.balance),0);
  const required=remaining/m;
  const drift=required-num(b.monthly);
  return {monthsLeft:m,remaining,required,drift,onTrack:drift<=0.5};
}
function nextPeriodDates(){
  const last=currentPeriod();
  let start;
  if(last){const e=new Date(last.end+"T12:00:00");e.setDate(e.getDate()+1);start=e}
  else{start=new Date();start.setDate(28)}
  const end=new Date(start);end.setMonth(end.getMonth()+1);end.setDate(27);
  const iso=d=>d.toISOString().slice(0,10);
  const label=fmtDate(iso(start))+" to "+fmtDate(iso(end));
  return {start:iso(start),end:iso(end),label};
}
function buildTransfers(startISO,endISO,discretionary){
  const start=new Date(startISO+"T12:00:00"),end=new Date(endISO+"T12:00:00");
  const days=Math.round((end-start)/86400000)+1;
  const n=Math.ceil(days/7);
  const each=Math.floor((discretionary/n)*100)/100;
  const t=[];
  for(let i=0;i<n;i++){
    const d=new Date(start);d.setDate(d.getDate()+i*7);
    const amt=(i===n-1)?Math.round((discretionary-each*(n-1))*100)/100:each;
    t.push({id:uid(),date:d.toISOString().slice(0,10),amount:amt,done:false});
  }
  return t;
}
function billsInNext7Days(){
  const now=new Date();const out=[];
  for(const b of state.bills){
    for(let add=0;add<=7;add++){
      const d=new Date(now);d.setDate(d.getDate()+add);
      if(d.getDate()===Number(b.day)){out.push({...b,when:d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}),inDays:add});break}
    }
  }
  return out.sort((a,c)=>a.inDays-c.inDays);
}
/* ------------------------ tabs + render ------------------------ */
const TABS=[["dash","Dashboard"],["buckets","Buckets"],["periods","Periods"],["setup","Setup"],["adviser","Adviser"],["sync","Sync"]];
let activeTab=location.hash.replace("#","")||"dash";
function renderTabs(){
  document.getElementById("tabs").innerHTML=TABS.map(([id,label])=>
    `<button class="${id===activeTab?'active':''}" onclick="go('${id}')">${label}</button>`).join("");
}
function go(tab){activeTab=tab;location.hash=tab;render()}
function render(){
  renderTabs();
  const p=currentPeriod();
  document.getElementById("mastPeriod").textContent=p?p.label:"";
  const v=document.getElementById("view");
  if(activeTab==="dash")v.innerHTML=viewDash();
  else if(activeTab==="buckets")v.innerHTML=viewBuckets();
  else if(activeTab==="periods")v.innerHTML=viewPeriods();
  else if(activeTab==="setup")v.innerHTML=viewSetup();
  else if(activeTab==="adviser"){v.innerHTML=viewAdviser();const c=document.getElementById("chat");if(c)c.scrollTop=c.scrollHeight}
  else if(activeTab==="sync")v.innerHTML=viewSync();
}

/* ------------------------ dashboard ------------------------ */
function viewDash(){
  const p=currentPeriod();
  if(!p)return `<div class="card"><h2>Welcome to Ledger</h2><p style="font-size:.9rem">This copy starts empty. Go to the Sync tab and either import your ledger-data.json backup or pull from your Gist, then everything appears here.</p></div>`;
  const disc=discretionaryOf(p);
  const transfers=p.transfers||[];
  const nDone=transfers.filter(t=>t.done).length;
  const next=transfers.find(t=>!t.done);
  const weekly=next?next.amount:(transfers.length?transfers[0].amount:disc/4.33);
  const radar=billsInNext7Days();
  const reimbPending=!p.reimbPaid;
  const savingsTotal=state.buckets.reduce((a,b)=>a+num(b.balance),0);
  const bySav=state.buckets.filter(b=>b.heldIn==="Savings account").reduce((a,b)=>a+num(b.balance),0);
  const byISA=state.buckets.filter(b=>b.heldIn==="ISA").reduce((a,b)=>a+num(b.balance),0);
  const driftFlags=state.buckets.map(b=>({b,t:targetMaths(b)})).filter(x=>x.t&&!x.t.onTrack);

  return `
  <div class="grid2">
    <div class="card">
      <div class="biglabel">This week's envelope</div>
      <div class="bignum green">${gbp(weekly)}</div>
      <p class="hint">Move it to Starling, then spend from Starling only. What is on the card is what is safe to spend.</p>
    </div>
    <div class="card">
      <div class="biglabel">Barclays floor</div>
      <div class="bignum">${gbp(state.settings.buffer)}</div>
      <p class="hint">Keep at least this in the current account for anything you forgot to budget. If you dip into it, top it back up from next week's envelope or a bucket.</p>
    </div>
  </div>

  <div class="card">
    <h2>Weekly transfers to Starling <span class="sub">${nDone} of ${transfers.length} moved this period</span></h2>
    <div class="stubs">
      ${transfers.map(t=>`
        <div class="stub ${t.done?'done':''} ${(!t.done&&next&&t.id===next.id)?'due':''}" tabindex="0" role="button"
             aria-pressed="${t.done}" onclick="toggleTransfer('${t.id}')" onkeydown="if(event.key==='Enter')toggleTransfer('${t.id}')">
          <div class="s-stamp">Moved</div>
          <div class="s-date">${fmtDate(t.date)}${t.label?` · ${esc(t.label)}`:""}</div>
          <div class="s-amt">${gbp(t.amount)}</div>
        </div>`).join("")||`<p class="empty">No transfers set for this period.</p>`}
    </div>
    <p class="hint">Tap a stub once the money has moved. The highlighted stub is the next one due.</p>
  </div>

  <div class="grid2">
    <div class="card">
      <h2>Bill radar <span class="sub">leaving Barclays in the next 7 days</span></h2>
      ${radar.length?`<table class="ledger"><tbody>
        ${radar.map(b=>`<tr><td>${esc(b.name)}</td><td>${b.when}</td><td class="num">${gbp(b.amount)}</td></tr>`).join("")}
        <tr><td colspan="2"><b>Total</b></td><td class="num"><b>${gbp(radar.reduce((a,b)=>a+num(b.amount),0))}</b></td></tr>
      </tbody></table>`:`<p class="empty">Nothing due in the next week.</p>`}
    </div>
    <div class="card">
      <h2>Reimbursement</h2>
      ${reimbPending?`
        <p style="font-size:.9rem">Expected reimbursement this period: <b class="money">${gbp(p.reimbExpected)}</b></p>
        <p class="hint" style="margin:6px 0 10px">After the sit down, enter the real figure and mark it received.</p>
        <div class="flexrow">
          <input class="num" id="reimbActual" style="width:110px" value="${p.reimbExpected}">
          <button class="btn small" onclick="markReimb('${p.id}')">Mark received</button>
        </div>
        <p class="hint" style="margin-top:8px"><span class="chip brass">Pending</span> Discretionary currently assumes the expected figure.</p>`
      :`
        <p style="font-size:.9rem">Received this period: <b class="money ok-text">${gbp(p.reimbReceived)}</b></p>
        <p class="hint" style="margin-top:6px"><span class="chip green">Received</span> ${num(p.reimbReceived)!==num(p.reimbExpected)?`Expected ${gbp(p.reimbExpected)}; discretionary uses the real figure.`:"Matched the expected figure."}</p>
        <button class="btn small quiet" style="margin-top:10px" onclick="unmarkReimb('${p.id}')">Undo</button>`}
    </div>
  </div>


  <div class="card">
    <h2>Barclays check <span class="sub">optional comfort glance</span></h2>
    ${(()=>{const u=unpaidBillsThisPeriod();const need=u.total+num(state.settings.buffer);
      const c=state.settings.barclaysCheck;
      const stale=c&&c.date!==todayISO();
      return `
      <p style="font-size:.88rem">Bills still to leave this period: <b class="money">${gbp(u.total)}</b>${u.items.length?` (${u.items.map(i=>esc(i.name)).join(", ")})`:""}. With the ${gbp(state.settings.buffer)} floor, Barclays should hold at least <b class="money">${gbp(need)}</b>.</p>
      <div class="flexrow" style="margin-top:10px">
        <input class="num" id="barcBal" style="width:120px" placeholder="Balance" value="${c?c.balance:""}">
        <button class="btn small" onclick="doBarclaysCheck()">Check</button>
      </div>
      ${c?`<p class="hint" style="margin-top:8px">${c.balance>=need
        ?`<span class="chip green">Covered</span> ${gbp(c.balance)} on ${fmtDate(c.date)} leaves ${gbp(c.balance-need)} above what is needed.`
        :`<span class="chip claret">Short</span> ${gbp(c.balance)} on ${fmtDate(c.date)} is ${gbp(need-c.balance)} below what is needed; top up from a bucket or the next envelope.`}${stale?" This check is from a previous day; enter today's balance for a fresh one.":""}</p>`:""}`})()}
  </div>

  <div class="card">
    <h2>This period at a glance</h2>
    <table class="ledger"><tbody>
      <tr><td>Pay received</td><td class="num">${gbp(p.income)}</td></tr>
      <tr><td>Reimbursement ${p.reimbPaid?"received":"expected"}</td><td class="num">${gbp(p.reimbPaid?p.reimbReceived:p.reimbExpected)}</td></tr>
      <tr><td>Bills</td><td class="num">${gbp(p.billsTotal)}</td></tr>
      <tr><td>To Savings account</td><td class="num">${gbp(p.moveSavings)}</td></tr>
      <tr><td>To ISA</td><td class="num">${gbp(p.moveISA)}</td></tr>
      <tr><td><b>Discretionary</b></td><td class="num"><b>${gbp(disc)}</b></td></tr>
    </tbody></table>
  </div>

  <div class="card">
    <h2>Buckets <span class="sub">${gbp(savingsTotal)} across all pots · ${gbp(bySav)} in savings · ${gbp(byISA)} in ISA</span></h2>
    <table class="ledger">
      <thead><tr><th>Bucket</th><th class="num">Balance</th><th class="num">Target</th><th>Progress</th></tr></thead>
      <tbody>${state.buckets.map(b=>{
        const pct=b.goal?Math.min(num(b.balance)/num(b.goal),1):null;
        return `<tr><td>${esc(b.name)}</td><td class="num">${gbp(b.balance)}</td>
        <td class="num">${b.goal?gbp0(b.goal):""}</td>
        <td>${pct!=null?`<div class="bar" title="${Math.round(pct*100)}%"><i style="width:${Math.round(pct*100)}%"></i></div>`:""}</td></tr>`}).join("")}
      </tbody>
    </table>
    ${driftFlags.length?`<p class="hint" style="margin-top:10px"><span class="chip claret">Off track</span> ${driftFlags.map(x=>`${esc(x.b.name)} needs ${gbp0(x.t.required)} a month`).join("; ")}. Details on the Buckets tab.</p>`:""}
  </div>`;
}
function toggleTransfer(id){
  const p=currentPeriod();const t=(p.transfers||[]).find(x=>x.id===id);
  if(t){t.done=!t.done;persist();render();if(t.done)toast("Stamped. "+gbp(t.amount)+" moved to Starling.")}
}

function unpaidBillsThisPeriod(){
  const p=currentPeriod();if(!p)return {total:0,items:[]};
  const start=new Date(p.start+"T12:00:00"),end=new Date(p.end+"T12:00:00");
  const today=new Date();today.setHours(12,0,0,0);
  const items=[];
  for(const b of state.bills){
    const day=Number(b.day);
    const base=day>=28?start:end;
    const due=new Date(base.getFullYear(),base.getMonth(),day,12);
    if(due>=start&&due<=end&&due>=today)items.push({name:b.name,amount:num(b.amount),due});
  }
  items.sort((a,c)=>a.due-c.due);
  return {total:items.reduce((a,c)=>a+c.amount,0),items};
}

function viewSync(){

  return `

function saveKeys(){
  localStorage.setItem(LS_TOKEN,document.getElementById("ghToken").value.trim());
  localStorage.setItem(LS_APIKEY,document.getElementById("apiKey").value.trim());
  state.settings.gistId=document.getElementById("gistId").value.trim();
  persist(false);toast("Keys saved on this device.");
}
async function ghFetch(url,opts={}){
  const token=(document.getElementById("ghToken")?.value||localStorage.getItem(LS_TOKEN)||"").trim();
  if(!token)throw new Error("Add a GitHub token first.");
  const r=await fetch(url,{...opts,headers:{Authorization:"Bearer "+token,Accept:"application/vnd.github+json",...(opts.headers||{})}});
  if(!r.ok)throw new Error("GitHub said "+r.status+". Check the token has the gist scope.");
  return r.json();
}
async function pushGist(){
  try{
    saveKeys();
    const body={description:"Ledger budget data",public:false,files:{"ledger.json":{content:JSON.stringify(state,null,2)}}};
    let g;
    if(state.settings.gistId){g=await ghFetch("https://api.github.com/gists/"+state.settings.gistId,{method:"PATCH",body:JSON.stringify(body)})}
    else{g=await ghFetch("https://api.github.com/gists",{method:"POST",body:JSON.stringify(body)});state.settings.gistId=g.id;persist(false)}
    render();toast("Pushed to Gist.");
  }catch(e){toast(e.message)}
}
async function pullGist(){
  try{
    saveKeys();
    if(!state.settings.gistId)throw new Error("No Gist ID yet. Push once to create it.");
    const g=await ghFetch("https://api.github.com/gists/"+state.settings.gistId);
    const remote=JSON.parse(g.files["ledger.json"].content);
    const local=new Date(state.updatedAt),rem=new Date(remote.updatedAt);
    if(rem<local&&!confirm("The Gist copy is older than this device's data. Replace local data anyway?"))return;
    remote.settings.gistId=state.settings.gistId;
    state=remote;persist(false);render();toast("Pulled from Gist.");
  }catch(e){toast(e.message)}
}
function exportJSON(){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:"application/json"}));
  a.download="ledger-backup-"+todayISO()+".json";a.click();
}
function importJSON(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.version)throw 0;if(confirm("Replace all data on this device with the imported file?")){state=d;persist();render();toast("Imported.")}}catch(e){toast("That file is not a Ledger backup.")}};
  r.readAsText(f);
}

    </div>
    <div class="chat" id="chat">
      ${a.messages.length?a.messages.map(m=>`<div class="msg ${m.role==="user"?"user":"adviser"}">${esc(m.content).replace(/NOTE:.*$/m,"").trim().replace(/\*\*(.+?)\*\*/g,"<b>$1</b>")}</div>`).join("")
      :`<p class="empty">Pick a mode and begin. Period review reads your whole file; Decision check is for questions like "can the Holiday pot afford Sidmouth again in October".</p>`}
      <div id="thinking" style="display:none" class="msg adviser">Reading the ledger...</div>
    </div>
    <div class="chatbar">
      <textarea id="advInput" placeholder="${a.mode==="decision"?"Describe the decision, with amounts if you have them":"Ask about your numbers"}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAdviser()}"></textarea>
      <button class="btn" onclick="sendAdviser()">Send</button>
    </div>
    ${a.notebook.length?`<details style="margin-top:12px"><summary class="hint" style="cursor:pointer">Adviser's notebook (${a.notebook.length})</summary><ul class="notebook">${a.notebook.map((n,i)=>`<li>${esc(n)} <button class="btn small quiet" onclick="state.adviser.notebook.splice(${i},1);persist();render()">forget</button></li>`).join("")}</ul></details>`:""}
  </div>`;
}
function startAdviser(){
  const mode=state.adviser.mode;
  const opener=ADVISER_MODES[mode].opener;
  if(opener&&!state.adviser.messages.length){sendAdviser(opener)}
  else{document.getElementById("advInput").focus()}
}
async function sendAdviser(preset){
  const inp=document.getElementById("advInput");
  const text=(preset||inp.value).trim();
  if(!text)return;
  if(!preset)inp.value="";
  state.adviser.messages.push({role:"user",content:text});
  persist();render();
  const th=document.getElementById("thinking");th.style.display="block";
  document.getElementById("chat").scrollTop=1e9;
  try{
    const key=(localStorage.getItem(LS_APIKEY)||"").trim();
    const headers={"Content-Type":"application/json"};
    if(key){headers["x-api-key"]=key;headers["anthropic-version"]="2023-06-01";headers["anthropic-dangerous-direct-browser-access"]="true"}
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers,
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:ADVISER_SYSTEM(),
        messages:state.adviser.messages.map(m=>({role:m.role,content:m.content}))})});
    const data=await r.json();
    if(data.error)throw new Error(data.error.message||"API error");
    const reply=(data.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("\n").trim();
    const noteMatch=reply.match(/^NOTE:\s*(.+)$/m);
    if(noteMatch&&!state.adviser.notebook.includes(noteMatch[1].trim()))state.adviser.notebook.push(noteMatch[1].trim());
    state.adviser.messages.push({role:"assistant",content:reply});
    persist();
  }catch(e){
    state.adviser.messages.push({role:"assistant",content:"The adviser could not be reached. "+e.message+(localStorage.getItem(LS_APIKEY)?"":" If this file is hosted outside Claude, add an API key on the Sync tab.")});
    persist(false);
  }
  render();
}
render();
window.addEventListener("hashchange",()=>{const h=location.hash.replace("#","");if(TABS.some(t=>t[0]===h)){activeTab=h;render()}});
</script>
